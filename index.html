<style>
  :root{
    --bg: #1b1410;
    --bg2:#0f0a08;
    --fg: #e8e3da;
    --muted:#8a8278;
    --green:#8ec07c;
    --yellow:#e6c384;
    --blue:#7daea3;
    --magenta:#d3869b;
    --cyan:#89b4b6;
    --red:#ea6962;
    --orange:#e78a4e;
    --prompt-user:#8ec07c;
    --prompt-host:#8ec07c;
    --prompt-path:#7daea3;
    --selection: rgba(141,174,163,0.35);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at center, #25180f 0%, var(--bg) 55%, var(--bg2) 100%);
    color:var(--fg);
    font-family: "Ubuntu Mono","JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size:15.5px;
    line-height:1.45;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--selection); color:var(--fg);}

  /* window chrome (very subtle, optional) */
  .term{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    padding: 22px 26px 28px;
    overflow:hidden;
  }
  .titlebar{
    position:absolute; top:0; left:0; right:0;
    height:30px;
    display:flex; align-items:center; justify-content:center;
    background: linear-gradient(#2a1d16,#1c130e);
    border-bottom:1px solid #0a0604;
    color:#bdb6ab;
    font-size:12px;
    letter-spacing:.02em;
    user-select:none;
  }
  .titlebar .dots{ position:absolute; left:10px; display:flex; gap:8px; }
  .titlebar .dots span{
    width:12px; height:12px; border-radius:50%;
    background:#444; border:1px solid rgba(0,0,0,.4);
  }
  .titlebar .dots .r{background:#e06c5b;}
  .titlebar .dots .y{background:#e0b94b;}
  .titlebar .dots .g{background:#7bbf6a;}
  .term{ padding-top: 48px; }

  /* CRT-like very subtle scanlines + glow */
  .crt::before{
    content:"";
    pointer-events:none;
    position:fixed; inset:0;
    background:
      repeating-linear-gradient(to bottom, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
    z-index:5;
  }
  .crt::after{
    content:"";
    pointer-events:none;
    position:fixed; inset:0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index:6;
  }

  .screen{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    white-space:pre-wrap;
    word-break:break-word;
    scrollbar-width: thin;
    scrollbar-color: #3a2a20 transparent;
    text-shadow: 0 0 1px rgba(232,227,218,0.25);
  }
  .screen::-webkit-scrollbar{ width:8px; }
  .screen::-webkit-scrollbar-thumb{ background:#3a2a20; border-radius:4px; }

  .line{ display:block; }
  .row{ display:flex; align-items:flex-start; }
  .row > .ps1{ flex:0 0 auto; }
  .row > .cmd{ flex:1 1 auto; min-width:0; white-space:pre-wrap; word-break:break-word; }

  /* colors */
  .g{color:var(--green);}
  .y{color:var(--yellow);}
  .b{color:var(--blue);}
  .m{color:var(--magenta);}
  .c{color:var(--cyan);}
  .r{color:var(--red);}
  .o{color:var(--orange);}
  .mu{color:var(--muted);}
  .bold{font-weight:700;}
  .underline{text-decoration:underline;}

  .ok{ color:var(--green); }
  .fail{ color:var(--red); }
  .warn{ color:var(--yellow); }

  /* prompt segments */
  .ps1 .user{ color:var(--prompt-user); font-weight:700; }
  .ps1 .sep{ color:var(--fg); }
  .ps1 .path{ color:var(--prompt-path); font-weight:700; }
  .ps1 .sym{ color:var(--fg); margin-right:6px; }

  /* input row */
  #input-row{ display:flex; align-items:flex-start; gap:0; }
  #input-row .ps1{ white-space:pre; }
  #input-wrap{ position:relative; flex:1; min-width:0; }
  #input{
    background:transparent; border:0; outline:0;
    color:var(--fg);
    font: inherit;
    width:100%;
    caret-color: transparent;
    padding:0;
  }
  /* Custom blinking block cursor that follows text */
  #cursor{
    display:inline-block;
    width:0.6em; height:1.05em;
    background:var(--fg);
    vertical-align:-2px;
    margin-left:1px;
    animation: blink 1.05s steps(1) infinite;
    opacity:.95;
  }
  @keyframes blink { 50%{ opacity:0; } }

  /* ascii art block */
  .ascii{ white-space:pre; line-height:1.05; font-family: "JetBrains Mono","Ubuntu Mono", monospace; font-size: 13.5px; }

  /* neofetch layout */
  .neofetch{ display:flex; gap:22px; }
  .neofetch .left{ flex:0 0 auto; }
  .neofetch .right{ flex:1 1 auto; min-width:0; }

  /* ls grid */
  .ls{ display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap:0 18px; }
  .ls .dir{ color:var(--blue); font-weight:700;}
  .ls .file{ color:var(--fg); }
  .ls .exec{ color:var(--green); font-weight:700;}

  /* tree */
  .tree .dir{ color:var(--blue); font-weight:700; }
  .tree .file{ color:var(--fg); }

  /* selection lock */
  body.no-select { user-select:none; }

  /* mobile */
  @media (max-width: 720px){
    body{ font-size:13.5px; }
    .term{ padding: 44px 14px 18px; }
    .neofetch{ flex-direction:column; gap:6px; }
    .ls{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 420px){
    .ascii{ font-size: 10.5px; }
  }
</style>

/* ----------------------- fs helpers ----------------------- */
function pathToArr(p){
  if(!p) return CWD.slice();
  let parts;
  if(p.startsWith('/')) parts = p.split('/').filter(Boolean);
  else if(p === '~' || p.startsWith('~/')) {
    parts = ['home','sakib'].concat(p.slice(1).split('/').filter(Boolean));
  } else {
    parts = CWD.concat(p.split('/').filter(Boolean));
  }
  const out = [];
  for(const part of parts){
    if(part === '.') continue;
    if(part === '..') out.pop();
    else out.push(part);
  }
  return out;
}
function nodeAt(arr){
  let node = FS;
  for(const seg of arr){
    if(!node || node.type !== 'dir') return null;
    node = node.children[seg];
    if(!node) return null;
  }
  return node;
}
function fmtPath(arr){
  if(arr.length>=2 && arr[0]==='home' && arr[1]==='sakib'){
    return '~' + (arr.length>2 ? '/'+arr.slice(2).join('/') : '');
  }
  return '/'+arr.join('/');
}

/* ----------------------- output helpers ----------------------- */
function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function print(html=''){
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  $screen.appendChild(div);
  scrollBottom();
}
function printText(text=''){ print(escapeHTML(text)); }

function scrollBottom(){
  $screen.scrollTop = $screen.scrollHeight;
}

function ps1HTML(){
  return `<span class="ps1"><span class="user">${USER}@${HOST}</span><span class="sep">:</span><span class="path">${escapeHTML(fmtPath(CWD))}</span><span class="sym">$</span></span>`;
}
function echoPrompt(cmd){
  print(`<span class="row">${ps1HTML()}<span class="cmd">${escapeHTML(cmd)}</span></span>`);
}
function updatePromptUI(){
  $ps1.innerHTML = `<span class="user">${USER}@${HOST}</span><span class="sep">:</span><span class="path">${escapeHTML(fmtPath(CWD))}</span><span class="sym">$</span>&nbsp;`;
}

/* ----------------------- commands ----------------------- */
const CMDS = {};
const HELP = {};

function defcmd(name, fn, help){ CMDS[name] = fn; if(help) HELP[name] = help; }

defcmd('help', (args)=>{
  if(args[0]){
    const h = HELP[args[0]];
    if(h){ print(h); return; }
    printText(`help: no help topic for '${args[0]}'`);
    return;
  }
  print(
`<span class="bold">sakib-shell — available commands</span>

<span class="y">filesystem</span>      ls  cd  pwd  cat  tree  touch  mkdir  rm  clear
<span class="y">portfolio</span>       about  education  experience  projects  skills
                leadership  contact  socials  github  linkedin
                leetcode  resume
<span class="y">system</span>          neofetch  uname  whoami  date  history  echo  man
                sudo  locate  exit
<span class="y">extras</span>          easteregg  coffee  hireme  hacktheplanet

Type <span class="c">&lt;command&gt; --help</span> or <span class="c">man &lt;command&gt;</span> for details.`);
}, `Usage: help [COMMAND]

Show available commands, or detailed help for one command.`);

defcmd('pwd', ()=> printText('/'+CWD.join('/')),
`Usage: pwd
Print the current working directory.`);

defcmd('whoami', ()=> printText(USER),
`Usage: whoami
Print effective user name.`);

defcmd('date', ()=> printText(new Date().toString()),
`Usage: date
Print the system date and time.`);

defcmd('uname', (args)=>{
  if(args.includes('-a')) printText('sakib-shell sami 24.10-generic #1 SMP x86_64 GNU/Linux');
  else printText('sakib-shell');
}, `Usage: uname [-a]
Print system information.`);

defcmd('echo', (args, raw)=> printText(raw.slice(4).replace(/^\s+/,'') || ''),
`Usage: echo [STRING]...
Print the given string(s).`);

defcmd('clear', ()=> { $screen.innerHTML = ''; },
`Usage: clear
Clear the terminal screen. (Ctrl-L also works.)`);

defcmd('ls', (args)=>{
  const flags = args.filter(a=>a.startsWith('-'));
  const targets = args.filter(a=>!a.startsWith('-'));
  const showAll = flags.some(f=>f.includes('a'));
  const long = flags.some(f=>f==='-l' || f.includes('l'));
  const paths = targets.length? targets : ['.'];
  for(let i=0;i<paths.length;i++){
    if(paths.length>1) print(`<span class="mu">${escapeHTML(paths[i])}:</span>`);
    const arr = pathToArr(paths[i]);
    const node = nodeAt(arr);
    if(!node){ printText(`ls: cannot access '${paths[i]}': No such file or directory`); continue; }
    if(node.type==='file'){ printText(paths[i]); continue; }
    let entries = Object.keys(node.children);
    if(!showAll) entries = entries.filter(e=>!e.startsWith('.'));
    entries.sort();
    if(long){
      const lines = entries.map(name=>{
        const ch = node.children[name];
        const isDir = ch.type==='dir';
        const perm = isDir? 'drwxr-xr-x':'-rw-r--r--';
        const size = isDir? 4096 : (ch.content?.length || 0);
        const cls = isDir? 'dir':'file';
        return `${perm} 1 ${USER} ${USER} ${String(size).padStart(6,' ')} 2026-05-26 12:00 <span class="${cls}">${escapeHTML(name)}${isDir?'/':''}</span>`;
      });
      print(`<div class="tree">total ${entries.length}\n${lines.join('\n')}</div>`);
    } else {
      const cells = entries.map(name=>{
        const ch = node.children[name];
        const isDir = ch.type==='dir';
        return `<span class="${isDir?'dir':'file'}">${escapeHTML(name)}${isDir?'/':''}</span>`;
      });
      print(`<div class="ls">${cells.join('')}</div>`);
    }
  }
},
`Usage: ls [OPTION]... [FILE]...

List information about files and directories.

Options:
  -a, --all    show hidden files
  -l           use long listing format`);

defcmd('cd', (args)=>{
  const target = args[0] || '~';
  const arr = pathToArr(target);
  const node = nodeAt(arr);
  if(!node){ printText(`cd: ${target}: No such file or directory`); return; }
  if(node.type!=='dir'){ printText(`cd: ${target}: Not a directory`); return; }
  CWD = arr;
  updatePromptUI();
},
`Usage: cd [DIRECTORY]
Change the current working directory. With no argument, returns to home (~).`);

defcmd('cat', (args)=>{
  if(!args.length){ printText('cat: missing operand'); return; }
  for(const p of args){
    const arr = pathToArr(p);
    const node = nodeAt(arr);
    if(!node){ printText(`cat: ${p}: No such file or directory`); continue; }
    if(node.type==='dir'){ printText(`cat: ${p}: Is a directory`); continue; }
    printText(node.content);
  }
},
`Usage: cat [FILE]...
Concatenate FILE(s) to standard output.`);

defcmd('tree', (args)=>{
  const p = args[0] || '.';
  const arr = pathToArr(p);
  const node = nodeAt(arr);
  if(!node){ printText(`tree: ${p}: No such file or directory`); return; }
  const out = [];
  out.push(`<span class="dir">${escapeHTML(fmtPath(arr))}</span>`);
  function walk(n, prefix){
    if(n.type!=='dir') return;
    const names = Object.keys(n.children).filter(x=>!x.startsWith('.')).sort();
    names.forEach((name,i)=>{
      const last = i === names.length-1;
      const branch = last? '└── ':'├── ';
      const child = n.children[name];
      const cls = child.type==='dir'?'dir':'file';
      out.push(`${prefix}${branch}<span class="${cls}">${escapeHTML(name)}${child.type==='dir'?'/':''}</span>`);
      if(child.type==='dir') walk(child, prefix + (last?'    ':'│   '));
    });
  }
  walk(node, '');
  print(`<div class="tree">${out.join('\n')}</div>`);
},
`Usage: tree [PATH]
List contents of directories in a tree-like format.`);

defcmd('touch', (args)=>{
  if(!args.length){ printText('touch: missing file operand'); return; }
  for(const p of args){
    const arr = pathToArr(p);
    const name = arr.pop();
    const parent = nodeAt(arr);
    if(!parent || parent.type!=='dir'){ printText(`touch: cannot touch '${p}': No such file or directory`); continue; }
    if(!parent.children[name]) parent.children[name] = f('');
  }
},
`Usage: touch FILE...
Create empty files (or update timestamps).`);

defcmd('mkdir', (args)=>{
  if(!args.length){ printText('mkdir: missing operand'); return; }
  for(const p of args){
    const arr = pathToArr(p);
    const name = arr.pop();
    const parent = nodeAt(arr);
    if(!parent || parent.type!=='dir'){ printText(`mkdir: cannot create directory '${p}': No such file or directory`); continue; }
    if(parent.children[name]){ printText(`mkdir: cannot create directory '${p}': File exists`); continue; }
    parent.children[name] = d({});
  }
},
`Usage: mkdir DIRECTORY...
Create directories.`);

defcmd('rm', (args)=>{
  const flags = args.filter(a=>a.startsWith('-'));
  const targets = args.filter(a=>!a.startsWith('-'));
  const recursive = flags.some(f=>f.includes('r'));
  if(!targets.length){ printText('rm: missing operand'); return; }
  for(const p of targets){
    const arr = pathToArr(p);
    const name = arr.pop();
    const parent = nodeAt(arr);
    if(!parent || !parent.children[name]){ printText(`rm: cannot remove '${p}': No such file or directory`); continue; }
    const node = parent.children[name];
    if(node.type==='dir' && !recursive){ printText(`rm: cannot remove '${p}': Is a directory`); continue; }
    if(arr.length<2 || arr[0]!=='home'){ printText(`rm: refusing to remove outside ~`); continue; }
    delete parent.children[name];
  }
},
`Usage: rm [OPTION]... FILE...

Remove files or directories.

Options:
  -r, -R    remove directories and their contents recursively`);

defcmd('history', ()=>{

defcmd('locate', (args)=>{
  if(!args.length){ printText('locate: no pattern'); return; }
  const q = args[0].toLowerCase();
  const hits = [];
  (function walk(node, path){
    if(node.type!=='dir') return;
    for(const [name,ch] of Object.entries(node.children)){
      const p = path+'/'+name;
      if(p.toLowerCase().includes(q)) hits.push(p);
      if(ch.type==='dir') walk(ch, p);
    }
  })(FS,'');
  if(!hits.length) printText('(no matches)');
  else hits.forEach(h=>printText(h));
},
`Usage: locate PATTERN
Find files by name (substring match).`);

/* ----------------------- input handling ----------------------- */
const HIST = [];
let histIdx = -1;

function run(rawIn){
  const raw = rawIn.trim();
  if(!raw){ echoPrompt(''); return; }
  echoPrompt(rawIn);
  HIST.push(raw); histIdx = HIST.length;

  // --help short-circuit
  const helpFlag = /\s--help\b/.test(' '+raw+' ');
  const tokens = raw.match(/(?:[^\s"']+|"[^"]*"|'[^']*')+/g) || [];
  const cmd = tokens.shift();
  const args = tokens.map(t => t.replace(/^["']|["']$/g,''));

  if(helpFlag){
    const h = HELP[cmd];
    if(h){ print(h); return; }
  }

  const fn = CMDS[cmd];
  if(!fn){
    print(`<span class="r">${escapeHTML(cmd)}</span>: command not found. Try <span class="c">help</span>.`);
    return;
  }
  try { fn(args.filter(a=>a!=='--help'), raw); }
  catch(e){ print(`<span class="r">error:</span> ${escapeHTML(e.message)}`); }
}

/* tab completion */
function complete(){
  const v = $input.value;
  const tokens = v.split(/\s+/);
  if(tokens.length === 1){
    const partial = tokens[0];
    const candidates = Object.keys(CMDS).filter(c => c.startsWith(partial));
    if(candidates.length===1){ $input.value = candidates[0]+' '; }
    else if(candidates.length>1){
      echoPrompt(v);
      print(candidates.join('   '));
    }
  } else {
    // path completion on last token
    const last = tokens[tokens.length-1];
    const slash = last.lastIndexOf('/');
    const base = slash>=0 ? last.slice(0,slash+1) : '';
    const tail = slash>=0 ? last.slice(slash+1) : last;
    const dirArr = pathToArr(base || '.');
    const node = nodeAt(dirArr);
    if(!node || node.type!=='dir') return;
    const matches = Object.keys(node.children).filter(n=>n.startsWith(tail));
    if(matches.length===1){
      const m = matches[0];
      const isDir = node.children[m].type==='dir';
      tokens[tokens.length-1] = base + m + (isDir?'/':'');
      $input.value = tokens.join(' ');
    } else if(matches.length>1){
      echoPrompt(v);
      print(matches.map(m=>{
        const isDir = node.children[m].type==='dir';
        return `<span class="${isDir?'dir':'file'}">${escapeHTML(m)}${isDir?'/':''}</span>`;
      }).join('   '));
    }
  }
  positionCursor();
}

function positionCursor(){
  // place fake cursor right after current input text
  const measure = document.createElement('span');
  measure.style.visibility='hidden';
  measure.style.whiteSpace='pre';
  measure.style.font = getComputedStyle($input).font;
  measure.textContent = $input.value;
  document.body.appendChild(measure);
  const w = measure.getBoundingClientRect().width;
  document.body.removeChild(measure);
  $cursor.style.position='absolute';
  $cursor.style.left = (w+1)+'px';
  $cursor.style.top  = '2px';
}

$input.addEventListener('input', positionCursor);
$input.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    const v = $input.value;
    $input.value = '';
    run(v);
    positionCursor();
    scrollBottom();
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(HIST.length===0) return;
    histIdx = Math.max(0, histIdx-1);
    $input.value = HIST[histIdx] || '';
    setTimeout(positionCursor,0);
  } else if(e.key === 'ArrowDown'){
    e.preventDefault();
    if(HIST.length===0) return;
    histIdx = Math.min(HIST.length, histIdx+1);
    $input.value = HIST[histIdx] || '';
    setTimeout(positionCursor,0);
  } else if(e.key === 'Tab'){
    e.preventDefault();
    complete();
  } else if(e.ctrlKey && (e.key==='l' || e.key==='L')){
    e.preventDefault();
    $screen.innerHTML = '';
  } else if(e.ctrlKey && (e.key==='c' || e.key==='C')){
    if(!window.getSelection().toString()){
      echoPrompt($input.value + '^C');
      $input.value=''; positionCursor();
    }
  } else if(e.key === 'Escape'){
    // allow boot skip via global handler
  }
});

/* Keep focus on input when clicking anywhere except on links/text-selection */
document.addEventListener('click', (e)=>{
  if(e.target.tagName === 'A') return;
  if(window.getSelection().toString()) return;
  $input.focus();
});

  print(`<span class="mu">Tip: press <span class="c">ESC</span> to skip boot.</span>`);
